name: fintech_dark
description: "A new Flutter project."

publish_to: 'none' 


version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State management
  flutter_bloc: ^8.1.6
  equatable: ^2.0.5

  # Dependency Injection
  get_it: ^7.7.0

  # Networking (abstraction layer; mocked in this assessment)
  dio: ^5.5.0+1

  # Local persistence
  shared_preferences: ^2.2.3

  # Functional error handling
  dartz: ^0.10.1

  # Charts (statistics card sparkline)
  fl_chart: ^0.68.0

  # Formatting
  intl: ^0.19.0

  # Navigation
  go_router: ^16.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  bloc_test: ^9.1.7
  mocktail: ^1.0.4

flutter:
  uses-material-design: true
  assets:
    - assets/images/